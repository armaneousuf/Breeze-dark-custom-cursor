    <path fill="#0000FF" stroke="#0000FF" stroke-width="6" d="M30 8a3 3 0 1 0 0 6zm0 58a3 3 0 1 0 0 6zm20-52a3 3 0 1 0 0-6zm0 58a3 3 0 1 0 0-6zM30 14h2V8h-2zm7 5v42h6V19zm-5 47h-2v6h2zm5-5a5 5 0 0 1-5 5v6c6.075 0 11-4.925 11-11zm-5-47a5 5 0 0 1 5 5h6c0-6.075-4.925-11-11-11zm18-6h-2v6h2zM37 19v42h6V19zm11 53h2v-6h-2zM37 61c0 6.075 4.925 11 11 11v-6a5 5 0 0 1-5-5zM48 8c-6.075 0-11 4.925-11 11h6a5 5 0 0 1 5-5z"/>
